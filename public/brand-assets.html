<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحميل الهوية البصرية - DZ Analytica</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }
        h2 { margin-bottom: 5px; color: #333; }
        p { color: #666; margin-bottom: 20px; }
        
        /* 1584 x 396 */
        #banner {
            width: 1584px;
            height: 396px;
            background-color: #08100D;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
            overflow: hidden;
        }
        
        /* 400 x 400 */
        #profile {
            width: 400px;
            height: 400px;
            background-color: #08100D;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -100px;
            right: 100px;
            width: 400px;
            height: 400px;
            background: #006233;
            filter: blur(140px);
            opacity: 0.4;
            border-radius: 50%;
        }
        .glow-2 {
            position: absolute;
            bottom: -100px;
            left: 100px;
            width: 400px;
            height: 400px;
            background: #C8A252;
            filter: blur(140px);
            opacity: 0.15;
            border-radius: 50%;
        }
        
        .logo-text {
            font-size: 120px;
            font-weight: 800;
            color: #FFFFFF;
            margin: 0;
            z-index: 10;
            padding: 0 40px;
        }
        .logo-text span {
            color: #C8A252;
        }
        .logo-icon {
            width: 140px;
            height: 140px;
            color: #C8A252;
            z-index: 10;
        }
        
        .profile-icon {
            width: 220px;
            height: 220px;
            color: #C8A252;
            z-index: 10;
        }

        .controls {
            margin-bottom: 60px;
            margin-top: 20px;
        }

        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #006233;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: background 0.2s;
            box-shadow: 0 4px 10px rgba(0, 98, 51, 0.3);
        }
        button:hover {
            background: #008244;
        }
        
        .preview-wrapper {
            transform: scale(0.6);
            transform-origin: center top;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: -150px; /* offset the scale */
        }
        
        .preview-wrapper-profile {
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h2>غلاف لينكدإن (LinkedIn Background Banner)</h2>
    <p>الدقة: 1584 × 396 بكسل (مثالي للينكدإن)</p>

    <div class="preview-wrapper">
        <div id="banner">
            <div class="glow-1"></div>
            <div class="glow-2"></div>
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
                <path d="M9 13a4.5 4.5 0 0 0 3-4"/>
                <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
                <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
                <path d="M6 18a4 4 0 0 1-1.968-.524"/>
                <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
                <path d="M15 13a4.5 4.5 0 0 1-3-4"/>
                <path d="M17.997 5.125A3 3 0 0 1 17.599 6.5"/>
                <path d="M20.523 10.896a4 4 0 0 0-.585-.396"/>
                <path d="M18 18a4 4 0 0 0 1.968-.524"/>
            </svg>
            <h1 class="logo-text">دزاير <span>أناليتيكا</span></h1>
        </div>
    </div>
    <div class="controls">
        <button onclick="downloadImage('banner', 'dz-analytica-linkedin-banner.png')">تحميل الغلاف عالي الدقة</button>
    </div>

    <hr style="width: 80%; border: 1px solid #eee; margin: 40px 0;">

    <h2>صورة الحساب (Profile Picture)</h2>
    <p>الدقة: 400 × 400 بكسل</p>

    <div class="preview-wrapper-profile">
        <div id="profile">
            <div class="glow-1" style="top: -50px; right: 50px; width: 200px; height: 200px; filter: blur(70px);"></div>
            <div class="glow-2" style="bottom: -50px; left: 50px; width: 200px; height: 200px; filter: blur(70px);"></div>
            <svg class="profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
                <path d="M9 13a4.5 4.5 0 0 0 3-4"/>
                <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
                <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
                <path d="M6 18a4 4 0 0 1-1.968-.524"/>
                <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
                <path d="M15 13a4.5 4.5 0 0 1-3-4"/>
                <path d="M17.997 5.125A3 3 0 0 1 17.599 6.5"/>
                <path d="M20.523 10.896a4 4 0 0 0-.585-.396"/>
                <path d="M18 18a4 4 0 0 0 1.968-.524"/>
            </svg>
        </div>
    </div>
    <div class="controls">
        <button onclick="downloadImage('profile', 'dz-analytica-profile.png')">تحميل صورة الحساب</button>
    </div>

    <script>
        function downloadImage(elementId, filename) {
            const element = document.getElementById(elementId);
            domtoimage.toPng(element, { bgcolor: '#08100D' })
                .then(function (dataUrl) {
                    const link = document.createElement('a');
                    link.download = filename;
                    link.href = dataUrl;
                    link.click();
                })
                .catch(function (error) {
                    console.error('Error generating image!', error);
                    alert('عذراً، حدث خطأ أثناء إنشاء الصورة.');
                });
        }
    </script>
</body>
</html>
