name: Generate Weekly News Articles

on:
  schedule:
    # Runs at 09:00 UTC (10:00 Algerian time) on Tuesday and Friday
    - cron: '0 9 * * 2,5'
  workflow_dispatch:
    inputs:
      subject:
        description: 'Optional: Specific subject or trend to write about (e.g., World Cup 2026 predictions)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Generate News Article via Gemini API
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_SUBJECT: ${{ github.event.inputs.subject }}
        run: node scripts/generate-articles.js

      - name: Create Pull Request for Review
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Draft article: ${{ steps.generate.outputs.title }}"
          title: "📝 Draft Article: ${{ steps.generate.outputs.title }}"
          body: |
            ### 🤖 Automated Draft Review Request
            
            A new multilingual B2B marketing/market analysis article has been generated by the Gemini Agent for DZ Analytica:
            
            * **Title (EN):** ${{ steps.generate.outputs.title }}
            * **Slug:** `${{ steps.generate.outputs.slug }}`
            
            #### 🔍 How to Review & Publish:
            1. Click on the **Files changed** tab above to review the changes in `src/data/articles.json`.
            2. If you want to modify any sentences (in Arabic, English, or French), you can click the edit icon on the file and commit changes directly to this branch.
            3. Once you are satisfied, click **Merge pull request**.
            4. Merging this PR will automatically build the site and deploy the article live on [dzanalytica.com](https://www.dzanalytica.com)!
          branch: "draft/article-${{ steps.generate.outputs.slug }}"
          base: main
