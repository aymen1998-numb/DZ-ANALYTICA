name: Generate Weekly News Articles

on:
  schedule:
    # Runs at 09:00 UTC (10:00 Algerian time) on Tuesday and Friday
    - cron: '0 9 * * 2,5'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Generate News Article via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-articles.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/articles.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate new B2B article [skip ci]" && git push)
